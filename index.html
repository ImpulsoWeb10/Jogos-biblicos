<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>⭐ Desafio Bíblico Kids | ImpulsoWeb10</title>
    
    <meta property="og:title" content="⭐ Desafio Bíblico Kids - Jogue Agora!">
    <meta property="og:description" content="50 perguntas bíblicas divertidas para crianças. Quem ganha o desafio?">
    <meta property="og:image" content="https://impulsoweb10.github.io/Jogos-biblicos/capa-jogo.jpg">

    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Fredoka+One&family=Quicksand:wght@500;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    
    <style>
        /* === ESTILO DO FUNDO BELO (CSS PURO) === */
        body { 
            font-family: 'Quicksand', sans-serif; 
            /* Degradê Suave de Fundo */
            background: linear-gradient(135deg, #fff3e0 0%, #e0f7fa 100%);
            background-attachment: fixed;
            overflow-x: hidden; 
            min-h-screen flex flex-col;
            position: relative;
        }
        
        /* Padrão Geométrico Sutil (Círculos) */
        body::before {
            content: "";
            position: fixed;
            inset: 0;
            background-image: url("data:image/svg+xml,%3Csvg width='80' height='80' viewBox='0 0 80 80' xmlns='http://www.w3.org/2000/svg'%3E%3Cg fill='%23f9a825' fill-opacity='0.03' fill-rule='evenodd'%3E%3Ccircle cx='40' cy='40' r='10'/%3E%3C/g%3E%3C/svg%3E");
            z-index: -1; /* Fica atrás de todo o conteúdo */
        }

        .font-kids { font-family: 'Fredoka One', cursive; }
        
        /* Modais Modernos com Blur */
        .modal { 
            display: none; 
            position: fixed; 
            inset: 0; 
            z-index: 100; 
            align-items: center; 
            justify-content: center; 
            background: rgba(0, 10, 30, 0.7); 
            backdrop-filter: blur(10px); 
            -webkit-backdrop-filter: blur(10px);
        }
        .modal.active { display: flex; }
        
        /* Efeito de Destaque do Jogador Ativo */
        .player-active { 
            ring: 10px; 
            ring-color: #fdd835; 
            transform: scale(1.03); 
            box-shadow: 0 20px 25px -5px rgba(253, 216, 53, 0.2), 0 10px 10px -5px rgba(253, 216, 53, 0.1);
            z-index: 10; 
            transition: all 0.4s ease-out;
        }
        
        /* Cards de Pergunta Transparentes e Elegantes */
        .card-pergunta { 
            background: rgba(255, 255, 255, 0.6) !important; 
            backdrop-filter: blur(4px);
            border: 1px solid rgba(255, 255, 255, 0.3);
            transition: all 0.3s ease;
            box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.05);
        }
        .card-pergunta:hover { 
            transform: translateY(-5px) scale(1.05); 
            background: rgba(255, 255, 255, 1) !important; 
            box-shadow: 0 10px 15px -3px rgba(0, 0, 0, 0.1);
        }
        .card-pergunta:disabled { 
            background: rgba(200, 210, 220, 0.3) !important; 
            color: #a0aec0; 
            cursor: not-allowed; 
            transform: none !important; 
            box-shadow: none;
        }
        
        /* Animação de Estrelinhas de Acerto */
        @keyframes star-pop { 
            0% { transform: scale(0); opacity: 0; } 
            50% { transform: scale(1.8); opacity: 1; }
            100% { transform: scale(1.5); opacity: 1; } 
        }
        .star-anim { animation: star-pop 0.6s ease-out forwards; }
    </style>
</head>
<body class="p-4 flex flex-col min-h-screen">

    <header class="max-w-4xl mx-auto text-center mb-8 w-full backdrop-blur-sm p-2 rounded-[2.5rem]">
        <h1 class="text-4xl md:text-6xl text-blue-700 font-kids mb-8 drop-shadow-lg uppercase tracking-tight">Desafio Bíblico Kids</h1>
        
        <div class="grid grid-cols-2 gap-6 items-center">
            <div id="p1-area" class="bg-white/80 p-5 rounded-[2.5rem] shadow-xl border-b-8 border-blue-500 player-active">
                <input type="text" id="name1" placeholder="Nome Criança 1" class="w-full text-center font-bold text-blue-700 outline-none bg-blue-50 rounded-2xl py-3 uppercase text-xs tracking-wider placeholder-blue-300">
                <div class="text-6xl font-kids text-blue-600 mt-3" id="score1">0</div>
                <p class="text-xs font-bold text-blue-400 uppercase tracking-widest">Pontos</p>
            </div>
            
            <div id="p2-area" class="bg-white/80 p-5 rounded-[2.5rem] shadow-xl border-b-8 border-pink-500">
                <input type="text" id="name2" placeholder="Nome Criança 2" class="w-full text-center font-bold text-pink-700 outline-none bg-pink-50 rounded-2xl py-3 uppercase text-xs tracking-wider placeholder-pink-300">
                <div class="text-6xl font-kids text-pink-600 mt-3" id="score2">0</div>
                <p class="text-xs font-bold text-pink-400 uppercase tracking-widest">Pontos</p>
            </div>
        </div>
        
        <div id="turn-indicator" class="mt-6 bg-yellow-500 text-white inline-block px-12 py-3 rounded-full font-black uppercase text-sm shadow-xl animate-pulse tracking-wide">
            Vez de começar! 🚀
        </div>
    </header>

    <main class="max-w-6xl mx-auto grid grid-cols-5 md:grid-cols-10 gap-3 mb-10 flex-grow" id="questions-grid"></main>
