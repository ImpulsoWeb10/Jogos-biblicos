<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Desafio Bíblico Kids | ImpulsoWeb10</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Fredoka+One&family=Quicksand:wght@500;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    
    <style>
        body { font-family: 'Quicksand', sans-serif; background-color: #f0f9ff; }
        h1, h2, .font-kids { font-family: 'Fredoka One', cursive; }
        
        .card-pergunta { transition: all 0.3s ease; border: 4px solid transparent; }
        .card-pergunta:hover { transform: scale(1.05); border-color: #fbbf24; }
        
        .modal { display: none; position: fixed; inset: 0; z-index: 100; align-items: center; justify-content: center; background: rgba(0,0,0,0.6); backdrop-filter: blur(5px); }
        .modal.active { display: flex; }

        .btn-opcao { transition: all 0.2s; border-bottom: 4px solid rgba(0,0,0,0.2); }
        .btn-opcao:active { transform: translateY(4px); border-bottom-width: 0; }
        
        .player-active { ring: 6px; ring-color: #fbbf24; transform: scale(1.05); box-shadow: 0 0 20px rgba(251, 191, 36, 0.5); }
    </style>
</head>
<body class="p-4 md:p-8">

    <header class="max-w-4xl mx-auto text-center mb-10">
        <h1 class="text-4xl md:text-6xl text-blue-600 mb-6 drop-shadow-sm">⭐ DESAFIO BÍBLICO KIDS ⭐</h1>
        
        <div class="grid grid-cols-2 gap-4">
            <div id="p1-area" class="bg-white p-4 rounded-[2rem] shadow-xl border-b-8 border-blue-500 player-active">
                <input type="text" placeholder="Nome da Criança 1" class="w-full text-center font-bold text-blue-600 outline-none bg-transparent placeholder-blue-300" value="Jogador 1">
                <div class="text-4xl md:text-6xl font-kids text-blue-500 mt-2" id="score1">0</div>
                <p class="text-xs font-bold uppercase tracking-widest text-blue-400">Pontos</p>
            </div>

            <div id="p2-area" class="bg-white p-4 rounded-[2rem] shadow-xl border-b-8 border-pink-500">
                <input type="text" placeholder="Nome da Criança 2" class="w-full text-center font-bold text-pink-600 outline-none bg-transparent placeholder-pink-300" value="Jogador 2">
                <div class="text-4xl md:text-6xl font-kids text-pink-500 mt-2" id="score2">0</div>
                <p class="text-xs font-bold uppercase tracking-widest text-pink-400">Pontos</p>
            </div>
        </div>
        
        <div id="turn-indicator" class="mt-6 bg-yellow-400 text-white inline-block px-8 py-2 rounded-full font-black uppercase text-sm animate-bounce">
            Vez do Jogador 1! 🚀
        </div>
    </header>

    <main class="max-w-6xl mx-auto grid grid-cols-5 md:grid-cols-10 gap-3" id="questions-grid">
        </main>

    <div id="quizModal" class="modal">
        <div class="bg-white w-full max-w-lg rounded-[3rem] p-8 m-4 shadow-2xl border-t-8 border-yellow-400">
            <div class="text-center">
                <span id="modal-player-name" class="text-sm font-bold text-gray-400 uppercase tracking-widest"></span>
                <h3 id="question-text" class="text-2xl md:text-3xl font-kids text-blue-900 mt-2 mb-8">Pergunta aqui?</h3>
                
                <div class="flex flex-col gap-4" id="options-container">
                    </div>
            </div>
        </div>
    </div>

    <div id="feedbackModal" class="modal">
        <div id="feedback-content" class="rounded-[3rem] p-10 text-center text-white shadow-2xl transform scale-110">
            <i id="feedback-icon" class="fas fa-check-circle text-8xl mb-4"></i>
            <h2 id="feedback-title" class="text-4xl font-kids">MUITO BEM!</h2>
            <p id="feedback-msg" class="mt-2 font-bold text-xl">Você ganhou 1 ponto!</p>
        </div>
    </div>

    <script>
        const questions = [
            { q: "Quem construiu a arca?", options: ["Noé", "Moisés", "Davi"], correct: 0 },
            { q: "Quem derrotou o gigante Golias?", options: ["Samuel", "Davi", "Saul"], correct: 1 },
            { q: "Quem foi engolido por um grande peixe?", options: ["Jonas", "Pedro", "Paulo"], correct: 0 },
            { q: "Quantos pães o menino entregou para Jesus?", options: ["10 pães", "5 pães", "2 pães"], correct: 1 },
            { q: "Qual o nome da mãe de Jesus?", options: ["Rute", "Ester", "Maria"], correct: 2 },
            { q: "Quem abriu o Mar Vermelho?", options: ["Josué", "Moisés", "Elias"], correct: 1 },
            { q: "Quem foi o homem mais forte da Bíblia?", options: ["Sansão", "Gideão", "Pedro"], correct: 0 },
            { q: "Quantos discípulos Jesus tinha?", options: ["7", "10", "12"], correct: 2 },
            { q: "Onde Jesus nasceu?", options: ["Jerusalém", "Belém", "Nazaré"], correct: 1 },
            { q: "Quem foi jogado na cova dos leões?", options: ["Daniel", "José", "João"], correct: 0 },
            { q: "Qual o primeiro livro da Bíblia?", options: ["Mateus", "Gênesis", "Êxodo"], correct: 1 },
            { q: "Quem era o pai de Salomão?", options: ["Davi", "Saul", "Abraão"], correct: 0 },
            { q: "O que o arco-íris representa?", options: ["Chuva", "Aliança de Deus", "Fim do mundo"], correct: 1 },
            { q: "Quem foi vendido pelos irmãos?", options: ["Benjamim", "José", "Isaque"], correct: 1 },
            { q: "Zaqueu era muito...?", options: ["Alto", "Rico", "Baixo"], correct: 2 },
            { q: "Quantos dias Deus levou para criar o mundo?", options: ["6 dias", "7 dias", "10 dias"], correct: 0 },
            { q: "Quem andou sobre as águas com Jesus?", options: ["João", "Tiago", "Pedro"], correct: 2 },
            { q: "Qual era a profissão de Jesus?", options: ["Pescador", "Carpinteiro", "Médico"], correct: 1 },
            { q: "Quem recebeu os 10 mandamentos?", options: ["Moisés", "Arão", "Miriã"], correct: 0 },
            { q: "Como Davi venceu Golias?", options: ["Espada", "Funda e pedra", "Arco"], correct: 1 },
            { q: "Qual o nome do jardim onde Adão vivia?", options: ["Éden", "Getsêmani", "Oliveiras"], correct: 0 },
            { q: "Quem era o irmão de Moisés?", options: ["Arão", "Caim", "Lázaro"], correct: 0 },
            { q: "Qual passarinho Noé soltou primeiro?", options: ["Pomba", "Corvo", "Pardal"], correct: 1 },
            { q: "Jesus transformou água em...?", options: ["Suco", "Vinho", "Leite"], correct: 1 },
            { q: "Quem foi ressuscitado por Jesus?", options: ["Lázaro", "Estêvão", "Lucas"], correct: 0 },
            { q: "Qual o nome do gigante que Davi venceu?", options: ["Sansão", "Golias", "Elias"], correct: 1 },
            { q: "Quem era a esposa de Abraão?", options: ["Sara", "Rebeca", "Lia"], correct: 0 },
            { q: "O que Noé usou para cobrir a arca?", options: ["Folhas", "Piche/Betume", "Tecido"], correct: 1 },
            { q: "Quem batizou Jesus?", options: ["Pedro", "João Batista", "André"], correct: 1 },
            { q: "Para onde Jonas fugiu?", options: ["Nínive", "Tarsis", "Roma"], correct: 1 },
            { q: "Quem era o homem mais sábio?", options: ["Salomão", "Daniel", "Davi"], correct: 0 },
            { q: "Qual o nome do primeiro homem?", options: ["Abraão", "Adão", "Noé"], correct: 1 },
            { q: "Quem foi a primeira mulher?", options: ["Eva", "Sara", "Maria"], correct: 0 },
            { q: "O que caiu do céu para o povo comer?", options: ["Pão", "Maná", "Frutas"], correct: 1 },
            { q: "Quantos mandamentos existem?", options: ["5", "10", "12"], correct: 1 },
            { q: "O que Sansão usava para ter força?", options: ["Cabelo comprido", "Cinto", "Espada"], correct: 0 },
            { q: "Jesus curou 10 homens que tinham...?", options: ["Febre", "Lepra", "Cegueira"], correct: 1 },
            { q: "Quem foi o 'Pai da Fé'?", options: ["Pedro", "Abraão", "Jacó"], correct: 1 },
            { q: "Qual mar Moisés atravessou?", options: ["Mar Morto", "Mar Vermelho", "Mar da Galileia"], correct: 1 },
            { q: "Quem subiu num sicômoro para ver Jesus?", options: ["Zaqueu", "Mateus", "Bartimeu"], correct: 0 },
            { q: "Quem era o rei que queria matar Jesus bebê?", options: ["Herodes", "Pilatos", "César"], correct: 0 },
            { q: "O que os magos seguiram para achar Jesus?", options: ["Mapa", "Estrela", "Nuvem"], correct: 1 },
            { q: "Quem é o nosso Bom Pastor?", options: ["Moisés", "Davi", "Jesus"], correct: 2 },
            { q: "Quantas pragas caíram no Egito?", options: ["7", "10", "12"], correct: 1 },
            { q: "Quem sobreviveu à fornalha ardente?", options: ["Daniel", "3 amigos", "José"], correct: 1 },
            { q: "Quem perdeu tudo e não reclamou de Deus?", options: ["Jó", "Lázaro", "Paulo"], correct: 0 },
            { q: "Qual animal falou com Balaão?", options: ["Cachorro", "Jumenta", "Leão"], correct: 1 },
            { q: "Qual cidade as muralhas caíram?", options: ["Jericó", "Babilônia", "Tiro"], correct: 0 },
            { q: "Jesus é o Filho de...?", options: ["Davi", "Deus", "José"], correct: 1 },
            { q: "Qual o último livro da Bíblia?", options: ["Salmos", "João", "Apocalipse"], correct: 2 }
        ];

        let currentPlayer = 1;
        let score1 = 0;
        let score2 = 0;
        const grid = document.getElementById('questions-grid');

        // Inicializa o Grid de 50 Perguntas
        questions.forEach((q, index) => {
            const btn = document.createElement('button');
            btn.className = `card-pergunta bg-white rounded-2xl p-4 text-2xl font-kids text-gray-300 hover:text-yellow-500 shadow-md h-20 flex items-center justify-center`;
            btn.innerHTML = index + 1;
            btn.id = `q-${index}`;
            btn.onclick = () => openQuestion(index);
            grid.appendChild(btn);
        });

        function openQuestion(index) {
            const q = questions[index];
            const btn = document.getElementById(`q-${index}`);
            if(btn.disabled) return;

            const modal = document.getElementById('quizModal');
            document.getElementById('question-text').innerText = q.q;
            document.getElementById('modal-player-name').innerText = `Vez de: Jogador ${currentPlayer}`;
            
            const container = document.getElementById('options-container');
            container.innerHTML = '';

            q.options.forEach((opt, i) => {
                const b = document.createElement('button');
                b.className = `btn-opcao w-full py-4 rounded-2xl font-bold text-white text-lg ${getOptionColor(i)}`;
                b.innerText = opt;
                b.onclick = () => checkAnswer(index, i);
                container.appendChild(b);
            });

            modal.classList.add('active');
        }

        function getOptionColor(i) {
            const colors = ['bg-blue-400', 'bg-green-400', 'bg-purple-400'];
            return colors[i];
        }

        function checkAnswer(qIdx, choiceIdx) {
            const isCorrect = questions[qIdx].correct === choiceIdx;
            const modal = document.getElementById('quizModal');
            const feedback = document.getElementById('feedbackModal');
            const content = document.getElementById('feedback-content');
            const icon = document.getElementById('feedback-icon');
            const title = document.getElementById('feedback-title');
            
            modal.classList.remove('active');
            
            // Marca pergunta como usada
            const btnOriginal = document.getElementById(`q-${qIdx}`);
            btnOriginal.disabled = true;
            btnOriginal.classList.replace('text-gray-300', 'bg-gray-200');
            btnOriginal.classList.add('opacity-50');

            if (isCorrect) {
                if(currentPlayer === 1) { score1++; document.getElementById('score1').innerText = score1; }
                else { score2++; document.getElementById('score2').innerText = score2; }
                
                content.className = "bg-green-500 rounded-[3rem] p-10 text-center text-white shadow-2xl transform scale-110";
                icon.className = "fas fa-star text-8xl mb-4 animate-spin";
                title.innerText = "ACERTOU!";
            } else {
                content.className = "bg-red-500 rounded-[3rem] p-10 text-center text-white shadow-2xl transform scale-110";
                icon.className = "fas fa-times-circle text-8xl mb-4 animate-bounce";
                title.innerText = "QUASE!";
            }

            feedback.classList.add('active');
            
            setTimeout(() => {
                feedback.classList.remove('active');
                togglePlayer();
            }, 2000);
        }

        function togglePlayer() {
            currentPlayer = currentPlayer === 1 ? 2 : 1;
            const p1 = document.getElementById('p1-area');
            const p2 = document.getElementById('p2-area');
            const indicator = document.getElementById('turn-indicator');

            if(currentPlayer === 1) {
                p1.classList.add('player-active');
                p2.classList.remove('player-active');
                indicator.innerText = "Vez do Jogador 1! 🚀";
                indicator.className = "mt-6 bg-blue-500 text-white inline-block px-8 py-2 rounded-full font-black uppercase text-sm animate-bounce";
            } else {
                p2.classList.add('player-active');
                p1.classList.remove('player-active');
                indicator.innerText = "Vez do Jogador 2! 🌸";
                indicator.className = "mt-6 bg-pink-500 text-white inline-block px-8 py-2 rounded-full font-black uppercase text-sm animate-bounce";
            }
        }
    </script>
</body>
</html>
